<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ortho Instrument Drill</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
#app{width:100%;max-width:540px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.hdr h1{font-size:18px;font-weight:600;color:#1a1a1a}
.hdr p{font-size:13px;color:#888;margin-top:2px}
.sr{text-align:right}
.sn{font-size:22px;font-weight:600;color:#1a1a1a}
.ss{font-size:12px;color:#999}
.pw{height:4px;background:#e5e5e5;border-radius:2px;margin-bottom:14px}
.pf{height:4px;background:#1D9E75;border-radius:2px;transition:width .3s}
.dots{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.dot{width:11px;height:11px;border-radius:50%;background:#e5e5e5}
.dot.ok{background:#1D9E75}
.dot.miss{background:#E24B4A}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{font-size:13px;padding:6px 16px;border-radius:100px;border:1px solid #ddd;background:transparent;cursor:pointer;color:#666}
.tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:16px;overflow:hidden;margin-bottom:12px}
.imgw{background:#f9f9f7;display:flex;align-items:center;justify-content:center;height:200px;position:relative}
.imgw img{max-height:176px;max-width:86%;object-fit:contain}
.pill{position:absolute;top:10px;right:12px;font-size:11px;padding:3px 10px;border-radius:100px;background:#E1F5EE;color:#0F6E56;font-weight:600}
.body{padding:16px 18px}
.ql{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.topts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.topt{text-align:left;padding:11px 13px;border:1px solid #e0e0e0;border-radius:10px;background:transparent;cursor:pointer;font-size:13.5px;color:#1a1a1a;line-height:1.3;transition:background .1s}
.topt:hover:not(:disabled){background:#f5f5f3}
.topt.right{background:#E1F5EE;border-color:#0F6E56;color:#085041;font-weight:500}
.topt.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313}
.qcard{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:18px;margin-bottom:12px}
.qt{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:8px;line-height:1.4}
.qf{font-size:13px;color:#666;margin-bottom:0;line-height:1.5}
.iopts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.iopt{border:2px solid #e0e0e0;border-radius:12px;background:#f9f9f7;cursor:pointer;display:flex;align-items:center;justify-content:center;height:150px;position:relative;padding:8px;transition:border-color .12s}
.iopt:hover:not(.locked){border-color:#999;background:#f0f0ee}
.iopt img{max-height:128px;max-width:90%;object-fit:contain}
.iopt.right{border-color:#0F6E56;background:#E1F5EE}
.iopt.wrong{border-color:#A32D2D;background:#FCEBEB}
.itick{position:absolute;bottom:6px;right:8px;font-size:13px;font-weight:700}
.iopt.right .itick{color:#0F6E56}
.iopt.wrong .itick{color:#A32D2D}
.fb{margin-top:12px;padding:11px 14px;border-radius:10px;font-size:13.5px;line-height:1.5}
.fb.right{background:#E1F5EE;color:#085041}
.fb.wrong{background:#FCEBEB;color:#501313}
.nxt{margin-top:10px;width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;background:transparent;cursor:pointer;font-size:14px;color:#1a1a1a;font-weight:500}
.nxt:hover{background:#f5f5f3}
.dcard{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:40px 24px;text-align:center}
.dbig{font-size:48px;font-weight:700;color:#1a1a1a}
.dpct{font-size:14px;color:#999;margin:4px 0 8px}
.dmsg{font-size:15px;color:#444;margin-bottom:24px}
.rst{padding:11px 30px;border:1px solid #ddd;border-radius:10px;background:transparent;cursor:pointer;font-size:14px;color:#1a1a1a;font-weight:500}
.rst:hover{background:#f5f5f3}
.spill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:100px;background:#E1F5EE;color:#0F6E56;font-weight:600;margin-bottom:10px}
</style>
</head>

const instruments=[
  {name:"Osteotome",fn:"Cuts and prepares bone; double-bevelled, driven by a mallet",cat:"Cutting"},
  {name:"Bone-Cutting Forceps",fn:"Cuts and removes bone segments during surgery",cat:"Cutting"},
  {name:"Chisel",fn:"Single-bevelled; splits bone when mallet-driven",cat:"Cutting"},
  {name:"Gouge",fn:"Curved chisel that scoops out bone tissue",cat:"Cutting"},
  {name:"Mallet",fn:"Surgical hammer that strikes chisels, osteotomes, and impactors",cat:"Cutting"},
  {name:"Bone Rongeur",fn:"Bites away small fragments of bone or cartilage",cat:"Cutting"},
  {name:"Saw",fn:"Cuts bone using oscillating motion in arthroplasty or amputation",cat:"Cutting"},
  {name:"Shears",fn:"Cuts through dense bone or tissue using scissor-like action",cat:"Cutting"},
  {name:"Plate Bender",fn:"Bends fixation plates to match bone contour in fracture surgery",cat:"Fixation"},
  {name:"Bone Holding Forceps",fn:"Grasps and holds bone fragments firmly during fixation",cat:"Fixation"},
  {name:"Clamp",fn:"Secures bone or tissue during surgical repair",cat:"Fixation"},
  {name:"Wire Bender",fn:"Shapes orthopaedic wires for cerclage or fixation",cat:"Fixation"},
  {name:"Screwdriver",fn:"Drives screws into bone for plate or implant fixation",cat:"Fixation"},
  {name:"Impactor",fn:"Drives implants or prostheses into position using controlled force",cat:"Fixation"},
  {name:"Cup Pusher",fn:"Seats the acetabular cup during hip replacement",cat:"Fixation"},
  {name:"Pliers",fn:"Bends or grips wires and small implants with controlled force",cat:"Fixation"},
  {name:"Driver",fn:"Drives pins, nails, or fixation devices into bone",cat:"Fixation"},
  {name:"Drill",fn:"Creates pilot holes in bone for screws, wires, or implants",cat:"Access"},
  {name:"Chuck",fn:"Holds drill bits or wires firmly in a hand drill",cat:"Access"},
  {name:"Pin Chuck",fn:"Specifically holds Kirschner wires or pins for insertion",cat:"Access"},
  {name:"Retractor",fn:"Holds back soft tissue to expose the surgical field",cat:"Exposure"},
  {name:"Bone Lever",fn:"Levers and displaces bone to improve surgical access",cat:"Exposure"},
  {name:"Hook",fn:"Retracts or manipulates soft tissue, tendons, or vessels",cat:"Exposure"},
  {name:"Elevator",fn:"Lifts and strips periosteum from bone surface for exposure",cat:"Exposure"},
  {name:"Rugine",fn:"Scrapes and elevates periosteum off bone (raspatory)",cat:"Exposure"},
  {name:"Spreader",fn:"Widens joint spaces or tissue gaps for access or implant seating",cat:"Exposure"},
  {name:"Dissecting Forceps",fn:"Grasps and manipulates tissue during dissection",cat:"Exposure"},
  {name:"Curette",fn:"Scoops out tissue, bone cysts, or necrotic material from a cavity",cat:"Debridement"},
  {name:"Rasp",fn:"Files and smooths bone surfaces, especially in joint replacement",cat:"Debridement"},
  {name:"File",fn:"Smooths rough bone edges after cutting",cat:"Debridement"},
  {name:"Scoop",fn:"Removes loose material or debris from a bony cavity",cat:"Debridement"},
  {name:"Extractor",fn:"Removes nails, screws, or implants from bone",cat:"Removal"},
  {name:"Wire Cutter",fn:"Cuts cerclage or Kirschner wires flush to bone",cat:"Removal"},
  {name:"Mole Grip",fn:"Self-locking grip for extracting wires or small implants",cat:"Removal"},
  {name:"Gauge",fn:"Measures bone dimensions or screw depth intraoperatively",cat:"Measurement"},
  {name:"Ruler",fn:"Measures bone or implant lengths intraoperatively",cat:"Measurement"},
  {name:"Probe",fn:"Explores cavities, bone tunnels, or tract depths",cat:"Measurement"},
  {name:"Bohler Stirrup",fn:"Suspends the limb under skeletal traction for fracture management",cat:"Positioning"},
  {name:"Suture Scissors",fn:"Cuts sutures during wound closure at the end of a case",cat:"Closure"},
  {name:"Forceps",fn:"General-purpose grasping and tissue-handling instrument",cat:"General"},
  {name:"Nail",fn:"Intramedullary rod inserted into bone canal to stabilise fractures",cat:"Fixation"},
  {name:"Bone Pins & Wires",fn:"Temporary or permanent fixation of small bone fragments (K-wires)",cat:"Fixation"},
];

const TOTAL=10;
let mode="img2name",session=[],cur=0,score=0,answered=false,results=[];
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function init(){session=shuffle(instruments).slice(0,TOTAL);cur=0;score=0;answered=false;results=[];window._ch=null;render()}
function setMode(m){mode=m;render()}

function imgTag(name,h){
  var uri=SVG_URIS[name]||"";
  if(uri)return'<img src="'+uri+'" alt="'+name+'" style="max-height:'+h+'px;max-width:90%;object-fit:contain"/>';
  return'<span style="font-size:11px;color:#aaa">'+name+'</span>';
}

function render(){
  var app=document.getElementById("app");
  if(cur>=TOTAL){renderDone(app);return}
  var it=session[cur];
  var pct=Math.round(cur/TOTAL*100);
  var tabs=[{id:"img2name",l:"Image → Name"},{id:"name2img",l:"Name → Image"}]
    .map(function(t){return'<button class="tab'+(mode===t.id?" on":"")+'" onclick="setMode(\''+ t.id+'\')">'+t.l+'</button>'}).join("");
  var dots=results.map(function(r){return'<div class="dot '+(r?"ok":"miss")+'"></div>'}).join("")+Array(TOTAL-results.length).fill('<div class="dot"></div>').join("");
  var d3=shuffle(instruments.filter(function(x){return x.name!==it.name})).slice(0,3);
  var opts4=shuffle([it].concat(d3));
  var content="";

  if(mode==="img2name"){
    var btns=opts4.map(function(o){
      var cls="topt",dis="";
      if(answered){dis="disabled";if(o.name===it.name)cls+=" right";else if(o.name===window._ch&&o.name!==it.name)cls+=" wrong"}
      return'<button class="'+cls+'" '+dis+' onclick="pick(\''+ o.name.replace(/\'/g,"\\\'")+'\')">'+o.name+'</button>';
    }).join("");
    var fb=answered?'<div class="fb '+(window._ch===it.name?"right":"wrong")+'">'+(window._ch===it.name?"✓ Correct!":"✗ That is")+' <strong>'+it.name+'</strong> — '+it.fn+'</div>':"";
    content='<div class="card"><div class="imgw">'+imgTag(it.name,176)+'<div class="pill">'+it.cat+'</div></div><div class="body"><div class="ql">What instrument is this?</div><div class="topts">'+btns+'</div>'+fb+(answered?'<button class="nxt" onclick="next()">Next →</button>':"")+'</div></div>';
  } else {
    var imgBtns=opts4.map(function(o){
      var cls="iopt",oc='onclick="pickImg(\''+ o.name.replace(/\'/g,"\\\'")+'\')"'  ,tick="";
      if(answered){cls+=" locked";oc="";if(o.name===it.name){cls+=" right";tick='<div class="itick">✓</div>'}else if(o.name===window._ch&&o.name!==it.name){cls+=" wrong";tick='<div class="itick">✗</div>'}}
      return'<div class="'+cls+'" '+oc+'>'+imgTag(o.name,128)+tick+'</div>';
    }).join("");
    var fb2=answered?'<div class="fb '+(window._ch===it.name?"right":"wrong")+'">'+(window._ch===it.name?"✓ Correct!":"✗ That is")+' <strong>'+it.name+'</strong> — '+it.fn+'</div>':"";
    content='<div class="qcard"><span class="spill">'+it.cat+'</span><div class="ql">Which image shows this instrument?</div><div class="qt">'+it.name+'</div><div class="qf">'+it.fn+'</div></div><div class="iopts">'+imgBtns+'</div>'+fb2+(answered?'<button class="nxt" onclick="next()">Next →</button>':"");
  }

  app.innerHTML='<div class="hdr"><div><h1>Ortho Instrument Drill</h1><p>42 instruments · morning drill</p></div><div class="sr"><div class="sn">'+score+"/"+cur+'</div><div class="ss">Q'+(cur+1)+" of "+TOTAL+'</div></div></div><div class="pw"><div class="pf" style="width:'+pct+'%"></div></div><div class="dots">'+dots+'</div><div class="tabs">'+tabs+'</div>'+content;
}

function pick(name){if(answered)return;answered=true;window._ch=name;var ok=name===session[cur].name;if(ok)score++;results.push(ok);render()}
function pickImg(name){if(answered)return;answered=true;window._ch=name;var ok=name===session[cur].name;if(ok)score++;results.push(ok);render()}
function next(){cur++;answered=false;window._ch=null;render()}

function renderDone(app){
  var pct=Math.round(score/TOTAL*100);
  var msg=pct===100?"Perfect score. Scrubbed in.":pct>=70?"Solid session — keep drilling.":"Keep at it, it will click.";
  var dots=results.map(function(r){return'<div class="dot '+(r?"ok":"miss")+'"></div>'}).join("");
  app.innerHTML='<div class="hdr"><div><h1>Ortho Instrument Drill</h1><p>42 instruments · morning drill</p></div></div><div class="dots" style="margin-bottom:20px">'+dots+'</div><div class="dcard"><div class="dbig">'+score+"/"+TOTAL+'</div><div class="dpct">'+pct+'% correct today</div><div class="dmsg">'+msg+'</div><button class="rst" onclick="init()">↺ New session</button></div>';
}

init();
</script>
