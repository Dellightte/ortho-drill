<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orthopaedic Instrument Drill</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 24px 16px; }
  #app { width: 100%; max-width: 540px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .header-left h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .header-left p { font-size: 13px; color: #888; margin-top: 2px; }
  .score-right { text-align: right; }
  .score-num { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .score-sub { font-size: 12px; color: #999; }
  .progress-wrap { height: 4px; background: #e5e5e5; border-radius: 2px; margin-bottom: 14px; }
  .progress-fill { height: 4px; background: #1D9E75; border-radius: 2px; transition: width 0.3s; }
  .streak-row { display: flex; gap: 5px; margin-bottom: 14px; flex-wrap: wrap; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: #e5e5e5; }
  .dot.ok { background: #1D9E75; }
  .dot.miss { background: #E24B4A; }
  .mode-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab { font-size: 13px; padding: 6px 16px; border-radius: 100px; border: 1px solid #ddd; background: transparent; cursor: pointer; color: #666; }
  .tab.on { background: #1a1a1a; color: #fff; border-color: #1a1a1a; font-weight: 500; }
  .card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; overflow: hidden; margin-bottom: 12px; }

  /* Image question: big SVG, text options */
  .big-img-wrap { background: #f9f9f7; display: flex; align-items: center; justify-content: center; height: 210px; position: relative; }
  .big-img-wrap svg { max-height: 185px; max-width: 85%; }
  .cat-pill { position: absolute; top: 10px; right: 12px; font-size: 11px; padding: 3px 10px; border-radius: 100px; background: #E1F5EE; color: #0F6E56; font-weight: 600; }
  .body { padding: 16px 18px; }
  .q-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .q-text { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 14px; line-height: 1.4; }
  .q-fn { font-size: 13px; color: #666; margin-bottom: 14px; line-height: 1.5; }
  .text-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .text-opt { text-align: left; padding: 11px 13px; border: 1px solid #e0e0e0; border-radius: 10px; background: transparent; cursor: pointer; font-size: 13.5px; color: #1a1a1a; line-height: 1.3; transition: background 0.1s; }
  .text-opt:hover:not(:disabled) { background: #f5f5f3; }
  .text-opt.right { background: #E1F5EE; border-color: #0F6E56; color: #085041; font-weight: 500; }
  .text-opt.wrong { background: #FCEBEB; border-color: #A32D2D; color: #501313; }

  /* Name question: text card, image grid */
  .q-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 18px; margin-bottom: 12px; }
  .img-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .img-opt { border: 2px solid #e0e0e0; border-radius: 12px; background: #f9f9f7; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 140px; position: relative; transition: border-color 0.12s; padding: 8px; }
  .img-opt:hover:not(.locked) { border-color: #999; background: #f0f0ee; }
  .img-opt svg { max-height: 118px; max-width: 90%; }
  .img-opt.right { border-color: #0F6E56; background: #E1F5EE; }
  .img-opt.wrong { border-color: #A32D2D; background: #FCEBEB; }
  .img-tick { position: absolute; bottom: 6px; right: 8px; font-size: 12px; font-weight: 700; }
  .img-opt.right .img-tick { color: #0F6E56; }
  .img-opt.wrong .img-tick { color: #A32D2D; }

  .feedback { margin-top: 12px; padding: 11px 14px; border-radius: 10px; font-size: 13.5px; line-height: 1.5; }
  .feedback.right { background: #E1F5EE; color: #085041; }
  .feedback.wrong { background: #FCEBEB; color: #501313; }
  .next-btn { margin-top: 10px; width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: transparent; cursor: pointer; font-size: 14px; color: #1a1a1a; font-weight: 500; }
  .next-btn:hover { background: #f5f5f3; }
  .done-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; padding: 40px 24px; text-align: center; }
  .done-big { font-size: 48px; font-weight: 700; color: #1a1a1a; }
  .done-pct { font-size: 14px; color: #999; margin: 4px 0 8px; }
  .done-msg { font-size: 15px; color: #444; margin-bottom: 24px; }
  .restart { padding: 11px 30px; border: 1px solid #ddd; border-radius: 10px; background: transparent; cursor: pointer; font-size: 14px; color: #1a1a1a; font-weight: 500; }
  .restart:hover { background: #f5f5f3; }
</style>
</head>

const TOTAL = 10;
let mode = "img2name", session = [], cur = 0, score = 0, answered = false, results = [];

function shuffle(a) { return [...a].sort(() => Math.random() - 0.5); }

function init() {
  session = shuffle(instruments).slice(0, TOTAL);
  cur = 0; score = 0; answered = false; results = [];
  window._chosen = null;
  render();
}

function setMode(m) { mode = m; render(); }

function render() {
  const app = document.getElementById("app");
  if (cur >= TOTAL) { renderDone(app); return; }
  const it = session[cur];
  const pct = Math.round((cur / TOTAL) * 100);

  const tabs = [
    { id:"img2name", label:"Image → Name" },
    { id:"name2img", label:"Name → Image" }
  ].map(t => `<button class="tab${mode===t.id?" on":""}" onclick="setMode('${t.id}')">${t.label}</button>`).join("");

  const dots = results.map(r=>`<div class="dot ${r?"ok":"miss"}"></div>`).join("") +
    Array(TOTAL-results.length).fill('<div class="dot"></div>').join("");

  const distractors = shuffle(instruments.filter(x=>x.name!==it.name)).slice(0,3);
  const opts4 = shuffle([it, ...distractors]);

  let content = "";

  if (mode === "img2name") {
    const btns = opts4.map(o => {
      let cls = "text-opt";
      let dis = "";
      if (answered) {
        dis = "disabled";
        if (o.name===it.name) cls+=" right";
        else if (o.name===window._chosen && o.name!==it.name) cls+=" wrong";
      }
      return `<button class="${cls}" ${dis} onclick="pick('${o.name.replace(/'/g,"\\'")}')">${o.name}</button>`;
    }).join("");

    let fb = answered ? `<div class="feedback ${window._chosen===it.name?"right":"wrong"}">${window._chosen===it.name?"✓ Correct!":"✗ That's"} <strong>${it.name}</strong> — ${it.fn}</div>` : "";

    content = `
      <div class="card">
        <div class="big-img-wrap">
          ${SVG[it.name] || ""}
          <div class="cat-pill">${it.cat}</div>
        </div>
        <div class="body">
          <div class="q-label">What instrument is this?</div>
          <div class="text-opts">${btns}</div>
          ${fb}
          ${answered ? `<button class="next-btn" onclick="next()">Next →</button>` : ""}
        </div>
      </div>`;
  } else {
    const imgBtns = opts4.map(o => {
      let cls = "img-opt";
      let onclick = `onclick="pickImg('${o.name.replace(/'/g,"\\'")}')"`;
      let tick = "";
      if (answered) {
        cls += " locked";
        onclick = "";
        if (o.name===it.name) { cls+=" right"; tick=`<div class="img-tick">✓</div>`; }
        else if (o.name===window._chosen && o.name!==it.name) { cls+=" wrong"; tick=`<div class="img-tick">✗</div>`; }
      }
      return `<div class="${cls}" ${onclick}>${SVG[o.name]||""}${tick}</div>`;
    }).join("");

    let fb = answered ? `<div class="feedback ${window._chosen===it.name?"right":"wrong"}">${window._chosen===it.name?"✓ Correct!":"✗ That's"} <strong>${it.name}</strong> — ${it.fn}</div>` : "";

    content = `
      <div class="q-card">
        <span class="cat-pill" style="position:static;margin-bottom:8px;display:inline-block">${it.cat}</span>
        <div class="q-label">Which image shows this instrument?</div>
        <div class="q-text">${it.name}</div>
        <div class="q-fn">${it.fn}</div>
      </div>
      <div class="img-opts">${imgBtns}</div>
      ${fb}
      ${answered ? `<button class="next-btn" onclick="next()">Next →</button>` : ""}`;
  }

  app.innerHTML = `
    <div class="header">
      <div class="header-left"><h1>Ortho Instrument Drill</h1><p>Surgical Holdings · 42 instruments</p></div>
      <div class="score-right"><div class="score-num">${score}/${cur}</div><div class="score-sub">Q${cur+1} of ${TOTAL}</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="streak-row">${dots}</div>
    <div class="mode-row">${tabs}</div>
    ${content}
  `;
}

function pick(name) {
  if (answered) return;
  answered = true; window._chosen = name;
  const ok = name===session[cur].name;
  if (ok) score++;
  results.push(ok);
  render();
}

function pickImg(name) {
  if (answered) return;
  answered = true; window._chosen = name;
  const ok = name===session[cur].name;
  if (ok) score++;
  results.push(ok);
  render();
}

function next() {
  cur++; answered = false; window._chosen = null;
  render();
}

function renderDone(app) {
  const pct = Math.round((score/TOTAL)*100);
  const msg = pct===100 ? "Perfect score. Scrubbed in." : pct>=70 ? "Solid session — keep drilling." : "Keep at it, it'll click soon.";
  const dots = results.map(r=>`<div class="dot ${r?"ok":"miss"}"></div>`).join("");
  app.innerHTML = `
    <div class="header"><div class="header-left"><h1>Ortho Instrument Drill</h1><p>Surgical Holdings · 42 instruments</p></div></div>
    <div class="streak-row" style="margin-bottom:20px">${dots}</div>
    <div class="done-card">
      <div class="done-big">${score}/${TOTAL}</div>
      <div class="done-pct">${pct}% correct today</div>
      <div class="done-msg">${msg}</div>
      <button class="restart" onclick="init()">↺ New session</button>
    </div>
  `;
}

init();
</script>
</body>
</html>
